<head>

        @font-face {

    <script>
        $(document).ready(function () {
            $('.fixed-action-btn').openFAB();
            $('.fixed-action-btn').closeFAB();
            $('.fixed-action-btn.toolbar').openToolbar();
            $('.fixed-action-btn.toolbar').closeToolbar();
            $('.tooltipped').tooltip({
                delay: 50
            });
        })
        $(document).ready(function(){
    $('.modal').modal();
  });
    </script>
</head>

<body oncontextmenu="return false;" onload="Materialize.toast('Go to Menu>Scorecard 1,2 for detailed scores', 5000,'rounded')">
    <main class="containr">
        <div class="oui-interaction center-align">

                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse z-depth-5" data-position="left" data-delay="50"
                            data-tooltip="Int'l Results" href="results.html"><i
                                class="material-icons">emoji_events</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse z-depth-5" data-position="left" data-delay="50"

                                class="material-icons">emoji_events</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse z-depth-5" data-position="left" data-delay="50"
                            data-tooltip="OUI Cric Home" href="index.html"><i class="material-icons">home</i></a>
                    </li>
                </ul>
            </div>
            <div class="oui-bubble orange accent-3">
              <ul class="pagination left-align">
                <li><a class="white-text waves-effect tooltipped" onclick="location.href='index.html'" data-tooltip="Back to Home" data-position="bottom"><i class="material-icons">chevron_left</i></a></li>
                <li><a class="white-text waves-effect tooltipped" onclick="location.reload()" data-tooltip="Refresh" data-position="bottom"><i class="material-icons">change_circle</i></a></li>
                <li><a class="white-text waves-effect modal-trigger tooltipped" href="#modal1" data-tooltip="Notifications" data-position="bottom"><i class="material-icons">notifications<sup id="nbdg"></sup></i></a></li>
              </ul>
              <div id="modal1" class="modal modal-fixed-footer">
                <div class="modal-content blue-grey darken-4 amber-text text-accent-2">
                  <h4>Notifications</h4>
                  <table class="transparent bordered white-text" id="noti"></table>
                </div>
                <div class="modal-footer blue-grey darken-4 amber-text text-accent-2">
                  <a href="#!" class="modal-close waves-effect white-text">CLOSE</a>
                </div>
              </div>
                <h4 class="white-text" id="now"></h4>
                <h5 class="white-text"><b>LIVE SCORECARD MINI</b></h5>
                <div class="oui-bubble show-on-large hide-on-med-and-down" id="demo"></div>
                <div class="oui-bubble show-on-medium-and-down hide-on-large-only" id="demo1"></div>
                <h5 class="white-text"><b>HEAD TO HEAD</b></h5>
                <div class="oui-bubble">
                    <table class="centered" id="demo2">
                    </table>
                </div>
                <div class="oui-button center waves-effect white black-text" onclick="location.href='iplresults.html'"><b>VIEW POINTS TABLE 2021</b></div>
                <h5 class="white-text"><b>COMING UP NEXT</b></h5>
                <div class="oui-bubble">
                    <table class="centered" id="demo3">
                    </table>
                </div>
            </div>
        </div>
        </div><br>
    </main>
    <script>
        let xmlhttp = new XMLHttpRequest();
xmlhttp.onreadystatechange = function () {
  if (this.readyState == 4 && this.status == 200) {
    let data = JSON.parse(this.responseText).feed.entry;

    let i;
    for (i = 0; i < data.length; i++) {
      let link = data[i]["gsx$_cn6ca"]["$t"];

      document.getElementById("demo").innerHTML +=
        "<iframe " +
        link ;
    }
  }
};

xmlhttp.open(
  "GET",
  "https://spreadsheets.google.com/feeds/list/13TDQzJrnnc18ZRQRFL77P0kYXCw6owyWIV3u6kt4Oq8/od6/public/values?alt=json",
  true
);
xmlhttp.send();
    </script>
