<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes">
    <title>One UI Cricket - IPL 2021</title>
    <link rel="stylesheet" href="OneUI/oui.min.css">
    <link rel="stylesheet" href="materialize.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="icon" href="OUC.ico">
    <style>
        @font-face {
            font-family: 'SamsungOne 400';
            src: local('SamsungOne 400'), url('SamsungOne-400.woff') format('woff');
        }

        * {
            font-family: 'SamsungOne 400';
            font-size: larger;
        }

        .oui-button {
            font-family: 'SamsungOne 400';
         }
    </style>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="materialize.js"></script>
    <script>
        $(document).ready(function () {
            $('.fixed-action-btn').openFAB();
            $('.fixed-action-btn').closeFAB();
            $('.fixed-action-btn.toolbar').openToolbar();
            $('.fixed-action-btn.toolbar').closeToolbar();
            $('.tooltipped').tooltip({
                delay: 50
            });
        })
    </script>
</head>

<body oncontextmenu="return false;" onload="Materialize.toast('*Go to Scorecard 1/2 for detailed scores', 5000,'rounded')">
    <main class="container">
        <div class="oui-interaction center-align">

            <div class="fixed-action-btn">

                </a>
                <ul>

                    </li>
                    <li><a class="btn-floating btn indigo darken-4 tooltipped" data-position="left" data-delay="50"

                    <li><a class="btn-floating btn indigo darken-4 tooltipped" data-position="left" data-delay="50"

                    </li>
                    <li><a class="btn-floating btn indigo darken-4 tooltipped" data-position="left" data-delay="50" 
                            data-tooltip="IPL Home" href="ipltt.html"><i class="material-icons">sports_cricket</i></a>
                    </li>
                </ul>
            </div>
