    <script>
        let xmlhttp = new XMLHttpRequest();
xmlhttp.onreadystatechange = function () {
  if (this.readyState == 4 && this.status == 200) {
    let data = JSON.parse(this.responseText).feed.entry;

    let i;
    for (i = 0; i < data.length; i++) {
      let date = data[i]["gsx$_cn6ca"]["$t"];
      let scor = data[i]["gsx$_cokwr"]["$t"];
      let rslt = data[i]["gsx$_cpzh4"]["$t"];

      document.getElementById("demo").innerHTML +=
        "<td" +
        date +
        "</td>" +
        "<td" +
        scor +
        "</td>" +
        "<td" +
        rslt +
        "</td>";
    }
  }
};

xmlhttp.open(
  "GET",
  "https://spreadsheets.google.com/feeds/list/1_A485VEVdMiMGgONGjulFGEA43L3opEUZGq_lVPQQRg/od6/public/values?alt=json",
  true
);
xmlhttp.send();
    </script>
