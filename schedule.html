<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes">
    <title>One UI Cricket - Schedules</title>
    <link rel="stylesheet" href="OneUI/oui.min.css">
    <link rel="stylesheet" href="materialize.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="icon" href="OUC.ico">
    <style>
        @font-face {
            font-family: 'SamsungOne 400';
            src: local('SamsungOne 400'), url('SamsungOne-400.woff') format('woff');
        }

        * {
            font-family: 'SamsungOne 400';
            font-size: larger;
        }

        .oui-button {
            font-family: 'SamsungOne 400';
         }
    </style>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="materialize.js"></script>
    <script>
        $(document).ready(function () {
            $('.fixed-action-btn').openFAB();
            $('.fixed-action-btn').closeFAB();
            $('.fixed-action-btn.toolbar').openToolbar();
            $('.fixed-action-btn.toolbar').closeToolbar();
            $('.tooltipped').tooltip({
                delay: 50
            });
        })
    </script>
</head>

<body oncontextmenu="return false;" onload="Materialize.toast('', 5000,'rounded')">
    <main class="containr">
        <div class="oui-interaction center-align">
            <!-- Interaction area -->
            <div class="fixed-action-btn">
                <a class="btn-floating btn-large blue darken-4 btn tooltipped pulse z-depth-5" data-position="left" data-delay="50"
                    data-tooltip="Menu">
                    <i class="large material-icons">more_vert</i>
                </a>
                <ul>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse z-depth-5" data-position="top" data-delay="50" data-tooltip="About"
                            href="about.html"><i class="material-icons">info</i></a></li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse z-depth-5" data-position="left" data-delay="50"
                            data-tooltip="Scorecard" href="live.html"><i class="material-icons">live_tv</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse z-depth-5" data-position="left" data-delay="50"
                            data-tooltip="IPL Schedule" href="ipltt.html"><i class="material-icons">view_list</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse z-depth-5" data-position="left" data-delay="50"
                            data-tooltip="IPL Results" href="iplresults.html"><i class="material-icons">emoji_events</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse z-depth-5" data-position="left" data-delay="50"
                            data-tooltip="Results" href="results.html"><i class="material-icons">emoji_events</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse z-depth-5" data-position="left" data-delay="50" 
                            data-tooltip="IPL Home" href="iplhome.html"><i class="material-icons">sports_cricket</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse z-depth-5" data-position="left" data-delay="50"
                            data-tooltip="OUI Cric Home" href="index.html"><i class="material-icons">home</i></a>
                    </li>
                </ul>
            </div>
            <div class="oui-bubble blue-grey darken-4">
                <div class="oui-bubble blue-grey darken-4">
                    <table class="centered bordered white-text" id="demo">
                    </table>
                </div>
            </div>
        </div><br>
    </main>
    <script>
        let xmlhttp3 = new XMLHttpRequest();
xmlhttp3.onreadystatechange = function () {
  if (this.readyState == 4 && this.status == 200) {
    let data = JSON.parse(this.responseText).feed.entry;

    let i;
    for (i = 0; i < data.length; i++) {
      let col1 = data[i]["gsx$_cn6ca"]["$t"];
      let col2 = data[i]["gsx$_cokwr"]["$t"];
      let col3 = data[i]["gsx$_cpzh4"]["$t"];
      let col4 = data[i]["gsx$_cre1l"]["$t"];

      document.getElementById("demo").innerHTML +=
      "<tr>" +
        "<td" +
        col1 +
        "</td>" +
        "<td" +
        col2 +
        "</td>" +
        "<td" +
        col3 +
        "</td>" +
        "<td" +
        col4 +
        "</td>" +
        "</tr>";
    }
  }
};

xmlhttp3.open(
  "GET",
  "https://spreadsheets.google.com/feeds/list/18Bo5Pkhyct5oIuw0PrcyRzZwT3tUgHpSJ49X9HvWWUU/od6/public/values?alt=json",
  true
);
xmlhttp3.send();
    </script>
</body>

</html>
