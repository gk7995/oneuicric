<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes">
    <title>One UI Cricket - Live Scorecard 1</title>
    <link rel="stylesheet" href="OneUI/oui.min.css">
    <link rel="stylesheet" href="materialize.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="icon" href="OUC.ico">
    <style>
        @font-face {
            font-family: 'SamsungOne 400';
            src: local('SamsungOne 400'), url('SamsungOne-400.woff') format('woff');
        }

        * {
            font-family: 'SamsungOne 400';
            font-size: larger;
        }

        .oui-button {
            font-family: 'SamsungOne 400';
         }
    </style>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="materialize.js"></script>
    <script>
        $(document).ready(function () {
            $('.fixed-action-btn').openFAB();
            $('.fixed-action-btn').closeFAB();
            $('.fixed-action-btn.toolbar').openToolbar();
            $('.fixed-action-btn.toolbar').closeToolbar();
            $('.tooltipped').tooltip({
                delay: 50
            });
        })
    </script>
</head>

<body oncontextmenu="return false;" onload="Materialize.toast('CSK vs RR', 5000,'rounded')">
    <main class="container">
        <div class="oui-interaction center-align">
            <!-- Interaction area -->
            <div class="fixed-action-btn">
                <a class="btn-floating btn-large blue darken-4 btn tooltipped pulse" data-position="left" data-delay="50"
                    data-tooltip="Menu">
                    <i class="large material-icons">more_vert</i>
                </a>
                <ul>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse" data-position="top" data-delay="50" data-tooltip="About"
                            href="about.html"><i class="material-icons">info</i></a></li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse" data-position="left" data-delay="50"
                            data-tooltip="OUI Cric Home" href="index.html"><i class="material-icons">home</i></a>
                    </li>
                    <!-- <li><a class="btn-floating btn blue darken-4 tooltipped pulse" data-position="left" data-delay="50"
                            data-tooltip="Int'l Schedule" href="schedule.html"><i class="material-icons">view_list</i></a>
                    </li> -->
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse" data-position="left" data-delay="50"
                            data-tooltip="IPL Schedule" href="ipltt.html"><i class="material-icons">view_list</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse" data-position="left" data-delay="50"
                            data-tooltip="Int'l Results" href="results.html"><i class="material-icons">emoji_events</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse" data-position="left" data-delay="50"
                            data-tooltip="IPL Results" href="iplresults.html"><i class="material-icons">emoji_events</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse" data-position="left" data-delay="50" 
                            data-tooltip="Scorecard 4" href="ipllive4.html"><i class="material-icons">live_tv&#8308;</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse" data-position="left" data-delay="50" 
                            data-tooltip="Scorecard 3" href="ipllive3.html"><i class="material-icons">live_tv&#179;</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse" data-position="left" data-delay="50" 
                            data-tooltip="Scorecard 2" href="ipllive.html"><i class="material-icons">live_tv&#178;</i></a>
                    </li>
                    <li><a class="btn-floating btn blue darken-4 tooltipped pulse" data-position="left" data-delay="50" 
                            data-tooltip="IPL Home" href="index.html"><i class="material-icons">sports_cricket</i></a>
                    </li>
                </ul>
            </div>
            <div class="oui-bubble orange accent-3">
                <div class="oui-bubble">
                    <iframe src="https://www.cricket.com/live-score/201008/scorecard/csk-vs-rr-match-12-indian-premier-league-2021" width="100%" height="3000px" scrolling="no"></iframe>
                </div>
            </div>
        </div><br>
    </main>
</body>

</html>
